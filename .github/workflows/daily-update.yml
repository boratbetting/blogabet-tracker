# Analiza danych + generacja dashboardu
# Uruchamia się automatycznie gdy Colab pushnie dane, lub ręcznie

name: "🎯 Analyze + Update Dashboard"

on:
  push:
    paths: ['data/tipsters_raw.json']  # auto-run when Colab pushes data
  workflow_dispatch:                    # manual trigger
  schedule:
    - cron: '0 6 * * *'               # daily check at 06:00 UTC

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "📊 Load data + Analyze + Dashboard"
        run: |
          python scraper.py
          python analyze.py

      - name: "📤 Commit"
        run: |
          git config user.name "Blogabet Bot"
          git config user.email "bot@blogabet-tracker.local"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "Brak zmian"
          else
            git commit -m "📊 $(date -u +'%Y-%m-%d') — update"
            git push
          fi

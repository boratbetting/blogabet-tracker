name: "📬 Parse Blogabet Emails"
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  parse-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run email parser
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python email_parser.py
      - name: Run tipster settlement
        env:
          BETSAPI_TOKEN: ${{ secrets.BETSAPI_TOKEN }}
        run: python settle_tipster_picks.py
      - name: Commit
        run: |
          git config user.name "Blogabet Bot"
          git config user.email "bot@betsedge.pl"
          git add -A
          git diff --cached --quiet || git commit -m "📬 $(date -u +'%Y-%m-%d') — email signals + settlements update"
          git push
